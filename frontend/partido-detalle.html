<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalle del Partido — DIMA CUP 2025</title>
  <link rel="stylesheet" href="css/global.css">
  <style>
    .match-hero {
      position: relative; overflow: hidden; padding: 40px 0 32px;
      background: linear-gradient(135deg, var(--navy-mid), var(--navy));
    }
    .match-hero::before {
      content:''; position:absolute; inset:0;
      background: radial-gradient(ellipse at 50% 40%, rgba(255,255,255,0.18) 0%, transparent 65%);
    }
    .match-hero .container { position: relative; z-index: 1; }
    .hero-grid {
      display: grid; grid-template-columns: 1fr auto 1fr;
      align-items: center; gap: 24px; margin-top: 20px;
    }
    .hero-team { display: flex; flex-direction: column; align-items: center; gap: 12px; text-align: center; }
    .hero-team a { text-decoration: none; color: inherit; }
    .hero-shield {
      width: 96px; height: 96px; background: var(--navy-card);
      border: 2px solid var(--glass-border); border-radius: var(--radius-lg);
      display: flex; align-items: center; justify-content: center; font-size: 2.6rem;
      overflow: hidden;
    }
    .hero-team .hname { font-family: var(--font-display); font-size: 1.2rem; letter-spacing: 1px; color: var(--white); }
    .hero-team .hrole { font-size: 0.65rem; color: var(--gray); text-transform: uppercase; letter-spacing: 2px; }
    .hero-center { display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .hero-score {
      font-family: var(--font-display); font-size: 3.2rem; letter-spacing: 6px; color: var(--gold);
      background: var(--navy-card); border: 1px solid var(--glass-border);
      padding: 10px 26px; border-radius: var(--radius-md); min-width: 160px; text-align: center;
    }
    .hero-vs {
      font-family: var(--font-display); font-size: 2.4rem; letter-spacing: 4px; color: var(--gray-dark);
      min-width: 160px; text-align: center;
    }
    .hero-meta {
      display: flex; flex-wrap: wrap; justify-content: center; gap: 18px;
      font-size: 0.78rem; color: var(--gray); margin-top: 24px;
    }

    /* Timeline minuto a minuto */
    .timeline { position: relative; margin: 0 auto; max-width: 640px; }
    .timeline::before {
      content:''; position:absolute; left:50%; top:0; bottom:0; width:2px;
      background: var(--glass-border); transform: translateX(-50%);
    }
    .tl-row { display: grid; grid-template-columns: 1fr 60px 1fr; align-items:center; margin-bottom: 14px; }
    .tl-side { display: flex; flex-direction: column; gap: 2px; font-size: 0.8rem; }
    .tl-side.right { text-align: right; align-items: flex-end; }
    .tl-side .ev-main { color: var(--white); font-weight: 600; display: flex; align-items: center; gap: 6px; }
    .tl-side.right .ev-main { flex-direction: row-reverse; }
    .tl-side .ev-sub { color: var(--gray); font-size: 0.68rem; }
    .tl-minuto {
      justify-self: center; font-family: var(--font-display); font-size: 0.82rem; color: var(--gold);
      background: var(--navy-mid); border: 1px solid var(--glass-border); border-radius: 20px;
      width: 46px; height: 26px; display: flex; align-items: center; justify-content: center; z-index: 1;
    }
    .empty-timeline { text-align: center; color: var(--gray); padding: 40px 20px; }

    @media (max-width: 640px) {
      .hero-grid { grid-template-columns: 1fr; text-align: center; }
      .hero-team { flex-direction: row; justify-content: center; }
      .hero-shield { width: 60px; height: 60px; font-size: 1.8rem; }
      .hero-score, .hero-vs { font-size: 2rem; min-width: auto; letter-spacing: 3px; }
      .tl-row { grid-template-columns: 1fr 44px 1fr; }
    }
  </style>
</head>
<body>
<div class="page-wrapper">

  <div class="match-hero">
    <div class="container">
      <div class="breadcrumb" style="margin-bottom: 10px;">
        <a href="index.html">Inicio</a> / <a href="resultados.html">Resultados</a> / <span id="breadcrumbLabel">Partido</span>
      </div>
      <div id="faseLabel" style="text-align:center;"></div>

      <div class="hero-grid" id="heroGrid">
        <!-- Se llena por JS -->
      </div>

      <div class="hero-meta" id="heroMeta"></div>
    </div>
  </div>

  <section class="section">
    <div class="container">

      <div class="section-header">
        <div class="accent-bar"></div>
        <h2>Minuto a Minuto</h2>
      </div>
      <div class="timeline" id="timeline"></div>

      <div id="mvpBlock" style="margin-top:48px;"></div>

    </div>
  </section>
</div>
<script src="js/shared.js"></script>
<script>
const EVENTO_ICON = { Gol: '⚽', Autogol: '⚽🔁', Asistencia: '🎯', Amarilla: '🟨', Roja: '🟥' };
const EVENTO_LABEL = { Gol: 'Gol', Autogol: 'Autogol', Asistencia: 'Asistencia', Amarilla: 'Tarjeta amarilla', Roja: 'Tarjeta roja' };

document.addEventListener('DOMContentLoaded', async () => {
  await DC.ready;
  const id = parseInt(new URLSearchParams(window.location.search).get('id'));
  const m = DC.getMatch(id);

  if (!m) {
    document.getElementById('heroGrid').innerHTML = `
      <div style="grid-column:1/-1;text-align:center;color:var(--gray);padding:40px;">
        Partido no encontrado. <a href="resultados.html" style="color:var(--electric);">Volver a resultados</a>
      </div>`;
    return;
  }

  const l = DC.getTeam(m.local);
  const v = DC.getTeam(m.visit);
  document.title = `${l?.short || '?'} vs ${v?.short || '?'} — DIMA CUP 2025`;
  document.getElementById('breadcrumbLabel').textContent = `${l?.short || '?'} vs ${v?.short || '?'}`;

  document.getElementById('faseLabel').innerHTML = `
    <span class="badge badge-gold">${m.fase || 'Grupos'}${m.jornada ? ' · Jornada ' + m.jornada : ''}</span>`;

  const finished = m.estado === 'Finalizado';

  document.getElementById('heroGrid').innerHTML = `
    <div class="hero-team">
      <a href="equipo-detalle.html?id=${l?.id}">
        <div class="hero-shield">${DC.crest(l, 'fill')}</div>
        <div class="hname">${l?.name || '—'}</div>
      </a>
      <div class="hrole">Local</div>
    </div>
    <div class="hero-center">
      ${finished
        ? `<div class="hero-score">${m.gL} — ${m.gV}</div>`
        : `<div class="hero-vs">VS</div>`}
      <span class="badge badge-${finished ? 'finished' : 'scheduled'}">${m.estado}</span>
    </div>
    <div class="hero-team">
      <a href="equipo-detalle.html?id=${v?.id}">
        <div class="hero-shield">${DC.crest(v, 'fill')}</div>
        <div class="hname">${v?.name || '—'}</div>
      </a>
      <div class="hrole">Visitante</div>
    </div>`;

  document.getElementById('heroMeta').innerHTML = [
    m.fecha ? `📅 ${m.fecha}` : '',
    m.hora ? `🕒 ${m.hora}` : '',
    m.cancha ? `📍 ${m.cancha}` : '',
  ].filter(Boolean).map(t => `<span>${t}</span>`).join('');

  // Timeline de eventos
  const eventos = (m.eventos || []).slice().sort((a, b) => (a.minuto ?? 999) - (b.minuto ?? 999));
  const tl = document.getElementById('timeline');
  if (!eventos.length) {
    tl.innerHTML = `<div class="empty-timeline">⚽ Aún no hay goles, tarjetas ni asistencias registradas para este partido.</div>`;
  } else {
    tl.innerHTML = eventos.map(ev => {
      const isLocal = ev.equipo == m.local;
      const jugador = ev.jugador ? DC.getPlayer(ev.jugador) : null;
      const content = `
        <div class="ev-main">
          <span>${EVENTO_ICON[ev.tipo] || '•'}</span>
          <span>${jugador ? jugador.name : EVENTO_LABEL[ev.tipo] || ev.tipo}</span>
        </div>
        <div class="ev-sub">${EVENTO_LABEL[ev.tipo] || ev.tipo}${ev.nota ? ' · ' + ev.nota : ''}</div>`;
      return `
        <div class="tl-row">
          <div class="tl-side">${isLocal ? content : ''}</div>
          <div class="tl-minuto">${ev.minuto != null ? ev.minuto + "'" : '—'}</div>
          <div class="tl-side right">${!isLocal ? content : ''}</div>
        </div>`;
    }).join('');
  }

  // MVP
  const mvp = m.mvp ? DC.getPlayer(m.mvp) : null;
  document.getElementById('mvpBlock').innerHTML = mvp ? `
    <div class="card" style="padding:24px;display:flex;align-items:center;gap:20px;">
      <div style="width:64px;height:64px;border-radius:var(--radius-md);background:var(--navy-mid);display:flex;align-items:center;justify-content:center;font-size:1.8rem;overflow:hidden;flex-shrink:0;">${DC.avatar(mvp, 'fill')}</div>
      <div>
        <div style="font-size:0.65rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gray);">🌟 MVP del partido</div>
        <a href="jugador-detalle.html?id=${mvp.id}" style="font-family:var(--font-display);font-size:1.3rem;letter-spacing:1px;color:var(--gold);text-decoration:none;">${mvp.name}</a>
      </div>
    </div>` : '';

  setTimeout(initScrollReveal, 100);
});
</script>
</body>
</html>
