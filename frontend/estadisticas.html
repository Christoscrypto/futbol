<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estadísticas — DIMA CUP 2025</title>
  <link rel="stylesheet" href="css/global.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div class="page-wrapper">
  <div class="page-banner">
    <div class="diagonal-stripe"></div>
    <div class="container">
      <div class="breadcrumb"><a href="index.html">Inicio</a> / Estadísticas</div>
      <h1>Estadísticas</h1>
    </div>
  </div>

  <section class="section">
    <div class="container">

      <!-- Global counters -->
      <div id="globalCounters" class="grid-4" style="margin-bottom:64px;"></div>

      <!-- Charts row -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:32px;margin-bottom:64px;" class="charts-layout">
        <div class="card fade-up" style="padding:28px;">
          <div style="font-size:0.65rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gray);margin-bottom:16px;">Goles por Equipo</div>
          <canvas id="goalsChart" height="240"></canvas>
        </div>
        <div class="card fade-up" style="padding:28px;">
          <div style="font-size:0.65rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gray);margin-bottom:16px;">Goles por Jornada</div>
          <canvas id="jornadaChart" height="240"></canvas>
        </div>
      </div>

      <!-- Podio de Goleadores -->
      <div class="section-header fade-up">
        <div class="accent-bar"></div>
        <h2>🏆 Podio de Goleadores</h2>
      </div>
      <div id="podioGoleadores" class="podium-row" style="margin-bottom:64px;"></div>

      <!-- Top Scorers + Assists -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:32px;" class="stats-two-col">
        <div>
          <div class="section-header fade-up">
            <div class="accent-bar"></div>
            <h2>Top Goleadores</h2>
          </div>
          <div id="topScorers" style="display:flex;flex-direction:column;gap:8px;"></div>
        </div>
        <div>
          <div class="section-header fade-up">
            <div class="accent-bar"></div>
            <h2>Top Asistencias</h2>
          </div>
          <div id="topAssists" style="display:flex;flex-direction:column;gap:8px;"></div>
        </div>
      </div>

    </div>
  </section>
</div>
<style>
  .podium-row {
    display: flex; align-items: flex-end; justify-content: center;
    gap: 16px; max-width: 640px; margin-left: auto; margin-right: auto;
  }
  .podium-item {
    flex: 1; max-width: 200px; display: flex; flex-direction: column; align-items: center;
    text-decoration: none; text-align: center;
  }
  .podium-crown { font-size: 1.6rem; margin-bottom: 6px; height: 26px; }
  .podium-avatar {
    width: 72px; height: 72px; border-radius: 50%; overflow: hidden;
    background: var(--navy-card); display: flex; align-items: center; justify-content: center;
    font-size: 2rem; margin-bottom: 10px; box-shadow: var(--shadow-glow);
  }
  .podium-name { font-weight: 700; color: var(--white); font-size: 0.9rem; margin-bottom: 2px; }
  .podium-team { font-size: 0.68rem; color: var(--gray); margin-bottom: 12px; }
  .podium-pedestal {
    width: 100%; border-radius: var(--radius-sm) var(--radius-sm) 0 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding-top: 10px;
  }
  .podium-goals { font-family: var(--font-display); font-size: 2rem; letter-spacing: 1px; }
  .podium-rank { font-size: 0.6rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; opacity: 0.8; margin-top: 2px; padding-bottom: 10px; }

  @media (max-width: 560px) {
    .podium-row { gap: 8px; }
    .podium-avatar { width: 52px; height: 52px; font-size: 1.4rem; }
    .podium-goals { font-size: 1.4rem; }
    .podium-name { font-size: 0.75rem; }
    .podium-team { font-size: 0.6rem; }
  }
</style>
<script src="js/shared.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  await DC.ready;
  const finished=DC.matches.filter(m=>m.estado==='Finalizado');
  const totalGoals=finished.reduce((s,m)=>s+m.gL+m.gV,0);
  const topScorer=[...DC.players].sort((a,b)=>b.goles-a.goles)[0];

  document.getElementById('globalCounters').innerHTML=[
    ['Total Goles',totalGoals,'⚽'],
    ['Total Asistencias',DC.players.reduce((s,p)=>s+p.asist,0),'🎯'],
    ['Tarjetas Amarillas',DC.players.reduce((s,p)=>s+p.amarillas,0),'🟨'],
    ['Tarjetas Rojas',DC.players.reduce((s,p)=>s+p.rojas,0),'🟥'],
  ].map(([l,v,ic])=>`
    <div class="stat-box fade-up">
      <div style="font-size:2rem;margin-bottom:8px;">${ic}</div>
      <div class="stat-num">${v}</div>
      <div class="stat-label">${l}</div>
    </div>`).join('');

  // Goals by team chart
  const teamsSorted=[...DC.teams].sort((a,b)=>b.gf-a.gf);
  new Chart(document.getElementById('goalsChart').getContext('2d'),{
    type:'bar',
    data:{
      labels:teamsSorted.map(t=>t.short),
      datasets:[{
        label:'GF',data:teamsSorted.map(t=>t.gf),
        backgroundColor:'rgba(255,255,255,0.7)',borderColor:'#FFFFFF',borderWidth:1,borderRadius:4,
      },{
        label:'GC',data:teamsSorted.map(t=>t.gc),
        backgroundColor:'rgba(255,68,68,0.5)',borderColor:'#FF3B5C',borderWidth:1,borderRadius:4,
      }]
    },
    options:{responsive:true,plugins:{legend:{labels:{color:'#999999',font:{size:11}}}},scales:{y:{grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'#999999'}},x:{grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'#999999'}}}}
  });

  // Goals per jornada
  const byJ={};
  finished.forEach(m=>{byJ[m.jornada]=(byJ[m.jornada]||0)+m.gL+m.gV;});
  new Chart(document.getElementById('jornadaChart').getContext('2d'),{
    type:'line',
    data:{
      labels:Object.keys(byJ).map(j=>'J'+j),
      datasets:[{
        label:'Goles',data:Object.values(byJ),
        borderColor:'#D4D4D4',backgroundColor:'rgba(212,212,212,0.1)',
        tension:0.4,fill:true,pointBackgroundColor:'#FFFFFF',pointRadius:5,
      }]
    },
    options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'#999999'}},x:{grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'#999999'}}}}
  });

  // Top scorers list
  const ts=[...DC.players].sort((a,b)=>b.goles-a.goles).slice(0,6);
  document.getElementById('topScorers').innerHTML=ts.map((p,i)=>{
    const team=DC.getTeam(p.team);
    return `
      <a href="jugador-detalle.html?id=${p.id}" class="fade-up" style="text-decoration:none;display:flex;align-items:center;gap:14px;padding:14px 18px;background:var(--navy-card);border:1px solid var(--glass-border);border-radius:var(--radius-md);transition:border-color 0.25s;" onmouseenter="this.style.borderColor='rgba(255,255,255,0.4)'" onmouseleave="this.style.borderColor='var(--glass-border)'">
        <div style="font-family:var(--font-display);font-size:1.3rem;color:${i===0?'var(--gold)':i===1?'#C0C0C0':i===2?'#CD7F32':'var(--gray-dark)'};width:24px;">${i+1}</div>
        <div style="font-size:1.3rem;">${DC.avatar(p, 28)}</div>
        <div style="flex:1;"><div style="font-weight:700;color:var(--white);font-size:0.9rem;">${p.name}</div><div style="font-size:0.7rem;color:var(--gray);">${DC.crest(team, 16)} ${team.name}</div></div>
        <div style="font-family:var(--font-display);font-size:1.8rem;color:var(--gold);">${p.goles}</div>
      </a>`;
  }).join('');

  // Top assists
  const ta=[...DC.players].sort((a,b)=>b.asist-a.asist).slice(0,6);
  document.getElementById('topAssists').innerHTML=ta.map((p,i)=>{
    const team=DC.getTeam(p.team);
    return `
      <a href="jugador-detalle.html?id=${p.id}" class="fade-up" style="text-decoration:none;display:flex;align-items:center;gap:14px;padding:14px 18px;background:var(--navy-card);border:1px solid var(--glass-border);border-radius:var(--radius-md);transition:border-color 0.25s;" onmouseenter="this.style.borderColor='rgba(255,255,255,0.4)'" onmouseleave="this.style.borderColor='var(--glass-border)'">
        <div style="font-family:var(--font-display);font-size:1.3rem;color:${i===0?'var(--gold)':i===1?'#C0C0C0':i===2?'#CD7F32':'var(--gray-dark)'};width:24px;">${i+1}</div>
        <div style="font-size:1.3rem;">${DC.avatar(p, 28)}</div>
        <div style="flex:1;"><div style="font-weight:700;color:var(--white);font-size:0.9rem;">${p.name}</div><div style="font-size:0.7rem;color:var(--gray);">${DC.crest(team, 16)} ${team.name}</div></div>
        <div style="font-family:var(--font-display);font-size:1.8rem;color:var(--electric);">${p.asist}</div>
      </a>`;
  }).join('');

  setTimeout(initScrollReveal,100);
});
</script>
</body>
</html>
